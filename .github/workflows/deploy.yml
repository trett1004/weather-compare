name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  deploy:
    name: Deploy to server
    needs: test
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync files to app directory
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            $GITHUB_WORKSPACE/ $HOME/repositories/weather-compare/

      - name: Install production dependencies
        run: |
          cd $HOME/repositories/weather-compare
          npm ci --omit=dev

      - name: Restart app
        run: pm2 restart weather-compare --update-env
